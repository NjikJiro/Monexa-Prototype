<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monexa - Level Unlocked</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style_materi.css">
</head>
<body>

    <main class="level-unlock-screen d-flex flex-column justify-content-between p-4 p-md-5">
        
        <div class="zone-indicator">
            <span class="text-secondary fw-semibold">ZONE 1:</span> 
            <span class="text-cyan tracking-wider ms-1">THE SHALLOW</span>
        </div>

        <div class="container text-center my-auto">
            <div class="icon-glow-circle mx-auto mb-4">
                <i class="bi bi-brightness-high"></i>
            </div>
            
            <h1 class="level-title fw-extrabold text-cyan text-glow mb-4">
                LEVEL 1 UNLOCKED: THE SHALLOW
            </h1>
            
            <p class="level-description text-light mx-auto leading-relaxed">
                Memahami dasar-dasar investasi, risiko, keuntungan, dan tujuan investasi
            </p>
        </div>

        <div class="d-flex justify-content-end w-100">
            <button class="btn btn-continue tracking-widest fw-bold px-4 py-2" id="btnContinue">
                CONTINUE
            </button>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
