<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monexa - Lumo AI Dialog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style_materi.css">
</head>
<body>

    <main class="dialog-screen d-flex flex-column justify-content-between p-4 p-md-5">
        
        <div class="d-flex justify-content-between align-items-center w-100">
            <div class="zone-indicator">
                <span class="text-secondary fw-semibold">ZONE 1:</span> 
                <span class="text-cyan tracking-wider ms-1">THE SHALLOW</span>
            </div>
            <div class="lumo-logo text-center">
                <img src="assets/lumo-character.png" alt="Lumo AI" class="logo-mini mb-1">
                <div class="logo-text">LUMO AI</div>
            </div>
        </div>

        <div class="container my-auto container-layout">
            <div class="row align-items-center justify-content-center">
                
                <div class="col-lg-5 text-center text-lg-start position-relative z-2 mb-4 mb-lg-0">
                    <img src="assets/lumo.png" alt="Lumo Character" class="img-fluid character-jelly floating-anim">
                </div>

                <div class="col-lg-7 position-relative z-2">
                    <div class="speech-bubble p-4 p-md-5">
                        <div class="bubble-tag mb-4">
                            <span class="tag-line"></span> LUMO
                        </div>
                        
                        <h2 class="bubble-title fw-bold text-cyan mb-3" id="typingTitle"></h2>
                        
                        <p class="bubble-desc text-secondary leading-relaxed mb-0" id="typingDesc"></p>
                    </div>
                </div>

            </div>
        </div>

        <div class="d-flex justify-content-end w-100">
            <button class="btn btn-continue tracking-widest fw-bold px-4 py-2" id="btnContinue">
                CONTINUE
            </button>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
